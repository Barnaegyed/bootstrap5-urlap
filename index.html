<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/index.css">
    <title>Kapcsolatoldal</title>
</head>
<body>
    <div class="container pt-5">
        <h1>Kapcsolat</h1>
        <p>Kérjük töltse ki az alábbi űrlapot!</p>
        <img src="img/img.png" alt="Kapcsolat" width="75px"></img>
        <div class="row">
            <div class="col p-12 colcolor">
                <form action="index.html">
                    <table class="table">
                        <tbody>
                            <tr>
                                <td>Név:</td>
                                <td><input type="text" class="form-control" id="name" placeholder="Név" name="name"></td>
                            </tr>
                            <tr>
                                <td>E-mail:</td>
                                <td><input type="email" class="form-control" id="email" placeholder="E-mail-cím" name="email"></td>
                            </tr>
                            <tr>
                                <td>Üzenet:</td>
                                <td><input type="text" class="form-control" id="message" placeholder="Üzenet" name="message"></td>
                            </tr>
                        </tbody>
                    </table>
                    <button type="submit" class="btn btn-primary">Beküldés</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
